<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemmings - JS Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        h1 {
            display: none;
        }

        #game-container {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        #controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            pointer-events: auto;
        }

        .tool-btn {
            padding: 8px 12px;
            font-size: 20px;
            cursor: pointer;
            background: rgba(22, 33, 62, 0.9);
            color: #fff;
            border: 2px solid #0f3460;
            border-radius: 5px;
            transition: all 0.2s;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn:hover {
            background: rgba(15, 52, 96, 0.9);
            border-color: #00ff88;
        }

        .tool-btn.active {
            background: #00ff88;
            color: #1a1a2e;
            border-color: #00ff88;
        }

        #stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            pointer-events: auto;
        }

        .stat {
            padding: 6px 12px;
            background: rgba(22, 33, 62, 0.9);
            border-radius: 5px;
            font-size: 14px;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }

        #message {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #instructions {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="ui-overlay">
            <div id="controls">
                <button class="tool-btn" data-tool="none" title="Select (S)">👆</button>
                <button class="tool-btn" data-tool="blocker" title="Blocker (B)">🛑</button>
                <button class="tool-btn" data-tool="digger" title="Digger (D)">⛏️</button>
                <button class="tool-btn" data-tool="builder" title="Builder (U)">🔨</button>
                <button class="tool-btn" data-tool="basher" title="Basher (A)">💥</button>
                <button class="tool-btn" data-tool="umbrella" title="Umbrella (M)">☂️</button>
                <button class="tool-btn" id="restart-btn" title="Restart (R)">🔄</button>
            </div>
            <div id="stats">
                <div class="stat">Released: <span class="stat-value" id="released">0</span></div>
                <div class="stat">Saved: <span class="stat-value" id="saved">0</span></div>
                <div class="stat">Lost: <span class="stat-value" id="lost">0</span></div>
                <div class="stat">Tools: <span class="stat-value" id="tool-uses">10</span></div>
            </div>
        </div>
        <div id="message"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
